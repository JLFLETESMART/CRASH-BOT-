# Automated deployment to Render.com
# Free tier available (apps sleep after 15 min of inactivity on free plan)
#
# Setup:
#   1. Create an account at https://render.com
#   2. Create a new "Web Service" and connect this GitHub repository
#   3. Set Build Command:  npm install
#      Set Start Command:  npm start
#   4. Copy the Deploy Hook URL from: Service → Settings → Deploy Hook
#   5. Add it as a GitHub secret named RENDER_DEPLOY_HOOK_URL
#      (Settings → Secrets and variables → Actions → New repository secret)
#   6. Push to main – this workflow triggers a Render deploy automatically

name: Deploy to Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests before deploy
        run: npm test
        env:
          TELEGRAM_TOKEN: ''
          TELEGRAM_CHAT_ID: ''

      - name: Trigger Render deploy hook
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$RENDER_DEPLOY_HOOK_URL")
          echo "Render deploy hook responded with HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Render deploy hook failed with HTTP status $HTTP_STATUS"
            exit 1
          fi
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
