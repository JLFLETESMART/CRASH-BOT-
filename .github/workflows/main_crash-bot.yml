# CI workflow for CRASH-BOT
# Builds, tests, and packages the app.
# For actual deployment choose one of the options below:
#   - Railway:  see .github/workflows/deploy-railway.yml
#   - Render:   see .github/workflows/deploy-render.yml
#   - Docker:   build with `docker build -t crash-bot .` and push to any registry
#   - VPS/local: see DEPLOYMENT_GUIDE.md

name: Build and Test – CRASH-BOT

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          # Ensure bot modules load without real credentials during CI
          TELEGRAM_TOKEN: ''
          TELEGRAM_CHAT_ID: ''

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          retention-days: 3
          path: |
            .
            !node_modules/
            !.git/
            !.env