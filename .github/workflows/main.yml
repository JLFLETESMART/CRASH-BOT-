name: CI – Build & Docker

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: Install, lint, test, validate syntax
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint
        continue-on-error: false

      - name: Validate syntax (Node require check)
        run: npm run build

      - name: Run tests
        run: npm test

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Build the Docker image (only on main branch pushes)
  # ────────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: crash-bot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
