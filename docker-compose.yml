version: "3.9"

services:
  crash-bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: crash-bot:latest
    container_name: crash-bot
    restart: always

    # Load all variables from the .env file on the host
    env_file:
      - .env

    # Override / add specific env vars here if needed
    environment:
      - NODE_ENV=production
      - PORT=3000

    ports:
      - "3000:3000"     # Health check endpoint

    volumes:
      - bot_data:/app/data    # SQLite database persistence
      - bot_logs:/app/logs    # Log file persistence

    networks:
      - bot_network

    # Resource limits (adjust to your VPS)
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "7"

volumes:
  bot_data:
    driver: local
  bot_logs:
    driver: local

networks:
  bot_network:
    driver: bridge
